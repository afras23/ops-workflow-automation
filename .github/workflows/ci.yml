name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: opsworkflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install psycopg2-binary

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Format check (ruff)
        run: ruff format --check app/ tests/

      - name: Type check
        run: mypy app/ --ignore-missing-imports

      - name: Run migrations against Postgres
        env:
          DATABASE_URL: postgresql://ops:ops@localhost:5432/ops_test
        run: alembic upgrade head

      - name: Test (pytest)
        env:
          CONFIDENCE_THRESHOLD: "0.78"
          SLACK_WEBHOOK_URL: ""
          DATABASE_URL: DATABASE_URL=postgresql://appuser:changeme@localhost:5432/opsworkflow
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
